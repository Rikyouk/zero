<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什么</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="env.js"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <div class="container">
        <h1>🍽️ 今天吃什么</h1>
        
        <div class="input-section">
            <div class="input-group">
                <label for="foodInput">添加菜品：</label>
                <input type="text" id="foodInput" placeholder="输入菜名，如：红烧肉">
                <button id="addFoodBtn">添加</button>
            </div>
            
            <div class="input-group">
                <label for="avoidInput">忌口：</label>
                <input type="text" id="avoidInput" placeholder="输入忌口，如：香菜">
                <button id="addAvoidBtn">添加</button>
            </div>
        </div>
        
        <div class="lists-section">
            <div class="list-box">
                <h3>菜品列表 <span id="foodCount">(0)</span></h3>
                <ul id="foodList"></ul>
            </div>
            
            <div class="list-box">
                <h3>忌口列表 <span id="avoidCount">(0)</span></h3>
                <ul id="avoidList"></ul>
            </div>
        </div>
        
        <div class="recommend-section">
            <div id="lastRecommend" class="last-recommend"></div>
            <button id="recommendBtn" class="recommend-btn">🎲 随机推荐</button>
            <div id="result" class="result"></div>
        </div>
        
        <div class="preset-section">
            <h3>快捷添加</h3>
            <button class="preset-btn" data-food="红烧肉">红烧肉</button>
            <button class="preset-btn" data-food="宫保鸡丁">宫保鸡丁</button>
            <button class="preset-btn" data-food="鱼香肉丝">鱼香肉丝</button>
            <button class="preset-btn" data-food="麻婆豆腐">麻婆豆腐</button>
            <button class="preset-btn" data-food="糖醋排骨">糖醋排骨</button>
            <button class="preset-btn" data-food="回锅肉">回锅肉</button>
            <button class="preset-btn" data-food="水煮鱼">水煮鱼</button>
            <button class="preset-btn" data-food="西红柿鸡蛋">西红柿鸡蛋</button>
        </div>

        <!-- AI 对话功能 -->
        <div class="ai-chat-section">
            <h3>🤖 AI 美食顾问</h3>
            <div class="chat-container">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="问我关于美食的问题...">
                    <button id="chatSendBtn">发送</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
